<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Garuda AI Market 2.0</title>
    <style>
        body { background: #000; color: #00f2ff; font-family: sans-serif; margin: 0; text-align: center; display: flex; flex-direction: column; min-height: 100vh; }
        .header { padding: 15px; border-bottom: 2px solid #00f2ff; background: #050505; box-shadow: 0 0 10px #00f2ff; }
        .orb { width: 85px; height: 85px; border: 3px solid #00f2ff; border-radius: 50%; margin: 20px auto; display: flex; align-items: center; justify-content: center; font-weight: bold; box-shadow: 0 0 20px #00f2ff; transition: 0.3s; }
        .btn-mic { background: #00f2ff; color: #000; border: none; padding: 18px 45px; border-radius: 50px; font-weight: bold; font-size: 18px; cursor: pointer; margin-bottom: 10px; box-shadow: 0 0 15px rgba(0,242,255,0.5); }
        #res-box { width: 90%; background: #0a1a1a; border: 1px solid #00f2ff; padding: 15px; margin: 10px auto; border-radius: 10px; min-height: 50px; color: #fff; text-align: left; font-size: 14px; box-shadow: inset 0 0 10px #000; }
        #chart { width: 98%; height: 500px; margin: 10px auto; border-radius: 10px; overflow: hidden; border: 1px solid #333; }
        .thinking { border-color: gold !important; box-shadow: 0 0 30px gold !important; color: gold !important; }
    </style>
</head>
<body>

    <div class="header">
        <h2 style="margin:0; letter-spacing: 2px;">🦅 GARUDA AI MARKET 2.0</h2>
    </div>

    <div class="orb" id="orb">ACTIVE</div>

    <button class="btn-mic" onclick="startGaruda()">SAY COMMAND</button>

    <div id="res-box">
        <div id="msg">> System Online. Ready for Neeraj.</div>
    </div>

    <div id="chart">
        <div id="tv_chart"></div>
    </div>

    <script src="https://s3.tradingview.com/tv.js"></script>
    <script>
        // TradingView Widget
        new TradingView.widget({
            "autosize": true, "symbol": "BINANCE:BTCUSDT", "interval": "15",
            "theme": "dark", "style": "1", "container_id": "tv_chart",
            "allow_symbol_change": true
        });

        // FIXED NEW KEY & STABLE API VERSION
        const KEY = "AIzaSyDKGIZzvE879788VUEERARohpxgoLHgQIc";

        async function startGaruda() {
            const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
            if (!SpeechRecognition) { alert("Bhai, Chrome use karein!"); return; }
            
            const rec = new SpeechRecognition();
            rec.lang = 'hi-IN';

            rec.onstart = () => { 
                document.getElementById('orb').innerText = "LISTENING";
                document.getElementById('orb').style.borderColor = "white";
            };

            rec.onresult = async (e) => {
                const userMsg = e.results[0][0].transcript;
                document.getElementById('msg').innerText = "> Neeraj: " + userMsg;
                
                const orb = document.getElementById('orb');
                orb.innerText = "THINKING";
                orb.classList.add('thinking');

                try {
                    // Stable v1 API with Gemini-Pro
                    const r = await fetch(`https://generativelanguage.googleapis.com/v1/models/gemini-pro:generateContent?key=${KEY}`, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ contents: [{ parts: [{ text: "Tum Neeraj ke assistant Garuda AI ho. Chhota hindi reply do: " + userMsg }] }] })
                    });
                    
                    const d = await r.json();
                    
                    if (d.error) {
                        document.getElementById('msg').innerText = "> Error: " + d.error.message;
                        orb.innerText = "RETRY";
                        orb.classList.remove('thinking');
                        return;
                    }

                    const reply = d.candidates[0].content.parts[0].text;
                    document.getElementById('msg').innerText = "> Garuda: " + reply;
                    orb.innerText = "SPEAKING";
                    orb.classList.remove('thinking');
                    orb.style.borderColor = "#00f2ff";

                    // Voice output
                    const ut = new SpeechSynthesisUtterance(reply);
                    ut.lang = 'hi-IN';
                    window.speechSynthesis.speak(ut);
                    
                    setTimeout(() => { orb.innerText = "ACTIVE"; }, 4000);
                } catch (err) {
                    document.getElementById('msg').innerText = "> Connection Error. Refresh karke try karein.";
                    orb.classList.remove('thinking');
                    orb.innerText = "RETRY";
                }
            };
            rec.start();
        }
    </script>
</body>
</html>
